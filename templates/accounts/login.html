{% extends 'base.html' %}

{% block title %}Login{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-6 col-lg-5">
        <div class="card bg-dark text-white border-secondary p-4 shadow-lg rounded">
            <h2 class="text-center mb-4 text-danger fw-bold">Sign In</h2>

            {% if error %}
            <div class="alert alert-danger" role="alert">
                {{ error }}
            </div>
            {% endif %}

            <form method="POST">
                {% csrf_token %}
                <div class="mb-3">
                    <label for="username" class="form-label">Username</label>
                    <input type="text" class="form-control bg-secondary text-white border-0" id="username"
                        name="username" required>
                </div>
                <div class="mb-4">
                    <label for="password" class="form-label">Password</label>
                    <input type="password" class="form-control bg-secondary text-white border-0" id="password"
                        name="password" required>
                </div>
                <button type="submit" class="btn btn-danger w-100 py-2">Login</button>
            </form>

            <div class="text-center mt-3">
                <p class="text-muted">New to Iteraplay? <a href="{% url 'register' %}" class="text-white">Sign up
                        now</a></p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
