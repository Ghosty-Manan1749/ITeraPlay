{% extends 'base.html' %}

{% block title %}Upload Movie{% endblock %}

{% block content %}
<div class="row justify-content-center mb-5">
    <div class="col-lg-8">
        <div class="card bg-dark text-white border-danger shadow">
            <div class="card-header border-danger bg-black d-flex justify-content-between align-items-center">
                <h4 class="mb-0 text-danger fw-bold">Upload New Movie</h4>
                <a href="{% url 'admin_dashboard' %}" class="btn btn-sm btn-outline-light">Back to Dashboard</a>
            </div>
            <div class="card-body p-4">
                <form method="POST" enctype="multipart/form-data">
                    {% csrf_token %}
                    <div class="row">
                        <div class="col-md-8 mb-3">
                            <label for="title" class="form-label fw-bold">Movie Title</label>
                            <input type="text" class="form-control bg-secondary text-white border-0" id="title"
                                name="title" required>
                        </div>
                        <div class="col-md-4 mb-3">
                            <label for="release_date" class="form-label fw-bold">Release Date</label>
                            <input type="date" class="form-control bg-secondary text-white border-0" id="release_date"
                                name="release_date" required>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label for="description" class="form-label fw-bold">Description</label>
                        <textarea class="form-control bg-secondary text-white border-0" id="description"
                            name="description" rows="4" required></textarea>
                    </div>

                    <div class="mb-3">
                        <label for="stream_link" class="form-label fw-bold">Streaming Link (CDN)</label>
                        <input type="url" class="form-control bg-secondary text-white border-0" id="stream_link"
                            name="stream_link" placeholder="https://..." required>
                        <div class="form-text text-muted">Direct iframe or video source URL for streaming.</div>
                    </div>

                    <div class="mb-3">
                        <label for="download_link" class="form-label fw-bold">Download Link (CDN)</label>
                        <input type="url" class="form-control bg-secondary text-white border-0" id="download_link"
                            name="download_link" placeholder="https://..." required>
                    </div>

                    <div class="row mb-4">
                        <div class="col-md-6 mb-3">
                            <label for="poster" class="form-label fw-bold">Movie Poster</label>
                            <input class="form-control bg-secondary text-white border-0" type="file" id="poster"
                                name="poster" accept="image/*" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="banner" class="form-label fw-bold">Banner Image (Optional)</label>
                            <input class="form-control bg-secondary text-white border-0" type="file" id="banner"
                                name="banner" accept="image/*">
                        </div>
                    </div>

                    <div class="mb-4 form-check form-switch">
                        <input class="form-check-input" type="checkbox" id="is_trending" name="is_trending">
                        <label class="form-check-label text-white fw-bold" for="is_trending">Trending Movie</label>
                    </div>
                    <div class="mb-4 form-check form-switch">
                        <input class="form-check-input" type="checkbox" id="is_new" name="is_new" checked>
                        <label class="form-check-label text-white fw-bold" for="is_new">New Release</label>
                    </div>

                    <hr class="border-secondary mt-4 mb-4">

                    <div class="d-grid gap-2 d-md-flex justify-content-md-end">
                        <a href="{% url 'admin_dashboard' %}" class="btn btn-outline-secondary me-md-2">Cancel</a>
                        <button type="submit" class="btn btn-danger fw-bold px-5">Upload Movie</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
