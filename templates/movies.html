<h2>Categories</h2>

<ul>
    {% for cat in categories %}
    <li>
        <a href="/category/{{cat.id}}/">{{cat.name}}</a>
    </li>
    {% endfor %}
</ul>

<hr>

<h2>Movies</h2>

{% for movie in movies %}
<div>
    <h3>{{movie.title}}</h3>
    <p>{{movie.description}}</p>

    <video width="400" controls>
        <source src="{{movie.movie_file.url}}" type="video/mp4">
    </video>
</div>
{% endfor %}
